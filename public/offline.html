<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Sin conexión — NextGen Fitness</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <style>
      /* Deliberately plain, inline, and dependency-free: this file is the service
         worker's last-resort fallback when navigation fails offline, so it must not
         rely on any hashed Next.js build asset (JS or CSS) that might not be cached. */
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        border: 1px solid #27272a;
        background: #09090b;
        border-radius: 24px;
        padding: 32px 24px;
        text-align: center;
      }
      .icon {
        font-size: 40px;
        line-height: 1;
      }
      h1 {
        font-size: 24px;
        font-weight: 900;
        margin: 20px 0 8px;
      }
      p {
        font-size: 14px;
        color: #a1a1aa;
        line-height: 1.5;
        margin: 0 0 24px;
      }
      a {
        display: block;
        background: #ccff00;
        color: #000;
        font-weight: 900;
        text-decoration: none;
        padding: 14px;
        border-radius: 16px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon">📡</div>
      <h1>Sin conexión</h1>
      <p>
        Esta sección no se cargó porque no tienes internet en este momento. Las rutinas guardadas que ya visitaste antes
        pueden seguir disponibles.
      </p>
      <a href="/">Volver al dashboard</a>
    </main>
  </body>
</html>
